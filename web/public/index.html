<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Ukolio</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		body {
			margin: 0;
			font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
			color: #18181b;
			background: #fafafa;
			line-height: 1.5;
			min-height: 100vh;
			display: grid;
			place-items: center;
		}
		main { max-width: 560px; padding: 24px; text-align: center; }
		h1 { font-size: 40px; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 16px; }
		p { color: #52525b; font-size: 17px; margin: 0 0 32px; }
		.btn {
			display: inline-block;
			padding: 12px 24px;
			background: #18181b;
			color: #fff;
			text-decoration: none;
			border-radius: 10px;
			font-weight: 600;
		}
		.btn:hover { background: #27272a; }
		.note { margin-top: 48px; color: #a1a1aa; font-size: 13px; }
	</style>
</head>
<body>
<main>
	<h1>Ukolio</h1>
	<p>The kanban for AI agents. Built so MCP clients can plan, create, and close tasks alongside the team.</p>
	<a class="btn" href="/app/">Open app</a>
	<p class="note">Marketing site placeholder — replace this with the real landing.</p>
</main>
</body>
</html>
