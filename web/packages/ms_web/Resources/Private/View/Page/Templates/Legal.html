<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<!--TYPO3SEARCH_begin-->
<div class="uk uk-landing uk-marketing uk-legal">

    <f:render partial="Marketing/TopBar" arguments="{_all}" />

    <main>
        <section class="section section-legal">
            <div class="section-inner legal-grid">
                <aside class="legal-toc">
                    <details class="legal-toc__details" open>
                        <summary class="legal-toc__label">
                            On this page
                            <svg class="legal-toc__chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                 aria-hidden="true">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                        </summary>
                        <nav class="legal-toc__nav" data-legal-toc></nav>
                    </details>
                </aside>

                <article class="legal-article" data-legal-body>
                    <div class="legal-eyebrow">Legal</div>
                    <h1 class="legal-title">{data.title}</h1>

                    <div class="legal-meta">
                        <f:if condition="{data.lastUpdated}">
                            <f:then>
                                <span>Last updated <strong><f:format.date format="F j, Y">{data.lastUpdated}</f:format.date></strong></span>
                            </f:then>
                            <f:else>
                                <span>Last updated <strong><f:format.date format="F j, Y" date="@{data.SYS_LASTCHANGED}" /></strong></span>
                            </f:else>
                        </f:if>
                    </div>

                    <div class="legal-body">
                        <f:cObject typoscriptObjectPath="lib.dynamicContent" data="0" />
                    </div>

                    <div class="legal-foot">
                        <span>Ukolio s.r.o.</span>
                        <span class="legal-foot__sep"></span>
                        <span>Karlovo náměstí 10, 120 00 Praha 2, Czech Republic</span>
                        <span class="legal-foot__sep"></span>
                        <span>IČO 12345678</span>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <f:render partial="Marketing/Footer" arguments="{_all}" />

</div>
<!--TYPO3SEARCH_end-->
</html>
