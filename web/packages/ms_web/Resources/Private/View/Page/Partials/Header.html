<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<f:if condition="{applicationContext} == 'Production'">
    <script async src="https://www.googletagmanager.com/gtag/js?id={gaMeasurementId}"></script>
    <script nonce="{f:security.nonce()}">
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', '{gaMeasurementId}');
    </script>
</f:if>

<header class="landing-topbar" data-landing-topbar>
    <a class="brand" href="/" aria-label="Ukolio">
        <img src="{f:uri.resource(path:'Images/logo-wordmark.svg', extensionName:'MsWeb')}" alt="Ukolio" class="brand-wordmark" width="66" height="24" />
    </a>

    <button type="button" class="landing-topbar__burger" aria-label="Menu" aria-expanded="false" aria-controls="landing-mobile-menu" data-landing-burger>
        <span class="landing-topbar__burger-bar"></span>
        <span class="landing-topbar__burger-bar"></span>
        <span class="landing-topbar__burger-bar"></span>
    </button>

    <div class="landing-topbar__drawer" id="landing-mobile-menu" data-landing-drawer>
        <f:cObject typoscriptObjectPath="lib.primaryNav" />
        <div class="topbar-actions">
            <f:cObject typoscriptObjectPath="lib.languageNav" />
            <a href="/app/login" class="btn btn--ghost btn--sm"><f:translate key="topbar.signIn" extensionName="MsWeb" /></a>
            <a href="/app/sign-up" class="btn btn--primary btn--sm"><f:translate key="topbar.getStarted" extensionName="MsWeb" /> <span class="arrow">&rarr;</span></a>
        </div>
    </div>
</header>

</html>
