<div class="task-card">
    <div class="task-card-head">
        <p class="task-card-name">{{ task().name }}</p>
        <span class="priority-chip" [class]="'priority-chip--' + task().priority.toLowerCase()">{{ ('app.priority.' + task().priority) | translate }}</span>
    </div>
    @if (task().description) {
        <p class="task-card-desc">{{ stripMd(task().description!) }}</p>
    }
    @if (task().dueDate) {
        <div class="task-card-meta" [class.is-overdue]="isOverdue(task().dueDate!)">
            {{ 'app.common.due' | translate }} {{ formatDate(task().dueDate!) }}
        </div>
    }
</div>
