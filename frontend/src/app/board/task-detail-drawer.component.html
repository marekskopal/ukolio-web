<div class="drawer-backdrop" (click)="onCancel()"></div>
<aside class="drawer">
    <header class="drawer-header">
        <h2>{{ (task() ? 'app.board.drawer.editTask' : 'app.board.drawer.newTask') | translate }}</h2>
        <button type="button" class="drawer-close" (click)="onCancel()">{{ 'app.board.drawer.close' | translate }}</button>
    </header>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="drawer-body">
        <div class="field">
            <label class="field-label">{{ 'app.common.name' | translate }}</label>
            <input type="text" formControlName="name" class="input" />
        </div>

        <div class="field">
            <div class="field-label-row">
                <label class="field-label">{{ 'app.common.description' | translate }}</label>
                <div class="tab-group">
                    <button type="button" class="tab-button" [class.is-active]="tab() === 'edit'" (click)="tab.set('edit')">{{ 'app.board.drawer.edit' | translate }}</button>
                    <button type="button" class="tab-button" [class.is-active]="tab() === 'preview'" (click)="tab.set('preview')">{{ 'app.board.drawer.preview' | translate }}</button>
                </div>
            </div>
            @if (tab() === 'edit') {
                <textarea formControlName="description" rows="8" [placeholder]="'app.board.drawer.descriptionPlaceholder' | translate" class="textarea md-editor"></textarea>
            } @else {
                <div class="md-preview">
                    @if (description()) {
                        <markdown [data]="description()"></markdown>
                    } @else {
                        <p class="text-subtle">{{ 'app.board.drawer.nothingToPreview' | translate }}</p>
                    }
                </div>
            }
        </div>

        <div class="field-row">
            <div class="field">
                <label class="field-label">{{ 'app.board.drawer.status' | translate }}</label>
                <select formControlName="statusId" class="select">
                    @for (s of statuses(); track s.id) {
                        <option [value]="s.id">{{ s.name }}</option>
                    }
                </select>
            </div>
            <div class="field">
                <label class="field-label">{{ 'app.common.priority' | translate }}</label>
                <select formControlName="priority" class="select">
                    <option value="Low">{{ 'app.priority.Low' | translate }}</option>
                    <option value="Medium">{{ 'app.priority.Medium' | translate }}</option>
                    <option value="High">{{ 'app.priority.High' | translate }}</option>
                </select>
            </div>
        </div>

        <div class="field">
            <label class="field-label">{{ 'app.board.drawer.dueDate' | translate }}</label>
            <input type="date" formControlName="dueDate" class="input input--narrow" />
        </div>
    </form>

    <footer class="drawer-footer">
        @if (task()) {
            <button type="button" class="btn-danger-link" (click)="onDelete()">{{ 'app.actions.delete' | translate }}</button>
        } @else {
            <span></span>
        }
        <div class="drawer-footer-actions">
            <button type="button" class="muted-link" (click)="onCancel()">{{ 'app.actions.cancel' | translate }}</button>
            <button type="button" class="btn btn-primary" [disabled]="form.invalid || saving()" (click)="onSubmit()">
                {{ (saving() ? 'app.actions.loading' : 'app.actions.save') | translate }}
            </button>
        </div>
    </footer>
</aside>
