<div class="auth-page">
    <div class="auth-page-card">
        <h1 class="auth-title">Sign in</h1>
        <p class="auth-subtitle">Welcome back. Sign in to your task manager.</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
            <div class="field">
                <label class="field-label">Email</label>
                <input type="email" formControlName="email" autocomplete="email" class="input" />
            </div>
            <div class="field">
                <label class="field-label">Password</label>
                <input type="password" formControlName="password" autocomplete="current-password" class="input" />
            </div>
            <button type="submit" class="btn btn-primary auth-submit" [disabled]="form.invalid || saving()">
                {{ saving() ? 'Signing in…' : 'Sign in' }}
            </button>
        </form>

        <p class="auth-footer">
            Don't have an account?
            <a routerLink="/sign-up" class="btn-link">Create one</a>
        </p>
    </div>
</div>
