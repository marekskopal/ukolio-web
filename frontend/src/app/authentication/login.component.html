<div class="auth-page">
    <div class="auth-page-card">
        <h1 class="auth-title">{{ 'app.auth.login.title' | translate }}</h1>
        <p class="auth-subtitle">{{ 'app.auth.login.subtitle' | translate }}</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
            <div class="field">
                <label for="login-email" class="field-label">{{ 'app.common.email' | translate }}</label>
                <input id="login-email" type="email" formControlName="email" autocomplete="email" class="input" />
            </div>
            <div class="field">
                <label for="login-password" class="field-label">{{ 'app.common.password' | translate }}</label>
                <input id="login-password" type="password" formControlName="password" autocomplete="current-password" class="input" />
            </div>
            <button type="submit" class="btn btn-primary auth-submit" [disabled]="form.invalid || saving()">
                {{ (saving() ? 'app.auth.login.submitting' : 'app.auth.login.submit') | translate }}
            </button>
        </form>

        <p class="auth-footer">
            {{ 'app.auth.login.noAccount' | translate }}
            <a routerLink="/sign-up" class="btn-link">{{ 'app.auth.login.signUp' | translate }}</a>
        </p>
    </div>
</div>
