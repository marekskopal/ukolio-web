<div class="auth-page">
    <div class="auth-page-card">
        <h1 class="auth-title">{{ 'app.auth.signUp.title' | translate }}</h1>
        <p class="auth-subtitle">{{ 'app.auth.signUp.subtitle' | translate }}</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
            <div class="field">
                <label for="signup-name" class="field-label">{{ 'app.common.name' | translate }}</label>
                <input id="signup-name" type="text" formControlName="name" autocomplete="name" class="input" />
            </div>
            <div class="field">
                <label for="signup-email" class="field-label">{{ 'app.common.email' | translate }}</label>
                <input id="signup-email" type="email" formControlName="email" autocomplete="email" class="input" />
            </div>
            <div class="field">
                <label for="signup-password" class="field-label">{{ 'app.common.password' | translate }}</label>
                <input id="signup-password" type="password" formControlName="password" autocomplete="new-password" class="input" />
                <p class="field-hint">{{ 'app.auth.errors.passwordPolicy' | translate }}</p>
            </div>
            <button type="submit" class="btn btn-primary auth-submit" [disabled]="form.invalid || saving()">
                {{ (saving() ? 'app.auth.signUp.submitting' : 'app.auth.signUp.submit') | translate }}
            </button>
        </form>

        <p class="auth-footer">
            {{ 'app.auth.signUp.hasAccount' | translate }}
            <a routerLink="/login" class="btn-link">{{ 'app.auth.signUp.logIn' | translate }}</a>
        </p>
    </div>
</div>
