<div class="auth-page">
    <div class="auth-page-card">
        <h1 class="auth-title">Create your account</h1>
        <p class="auth-subtitle">Sign up to start organizing your tasks.</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
            <div class="field">
                <label class="field-label">Name</label>
                <input type="text" formControlName="name" autocomplete="name" class="input" />
            </div>
            <div class="field">
                <label class="field-label">Email</label>
                <input type="email" formControlName="email" autocomplete="email" class="input" />
            </div>
            <div class="field">
                <label class="field-label">Password</label>
                <input type="password" formControlName="password" autocomplete="new-password" class="input" />
                <p class="field-hint">At least 8 characters with uppercase, lowercase, and a digit.</p>
            </div>
            <button type="submit" class="btn btn-primary auth-submit" [disabled]="form.invalid || saving()">
                {{ saving() ? 'Creating account…' : 'Create account' }}
            </button>
        </form>

        <p class="auth-footer">
            Already have an account?
            <a routerLink="/login" class="btn-link">Sign in</a>
        </p>
    </div>
</div>
