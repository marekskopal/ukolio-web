<div class="shell">
    <header class="topbar">
        <div class="topbar-inner">
            <a routerLink="/projects" class="brand">
                <span class="brand-mark"></span>
                Task Manager
            </a>
            <nav class="nav">
                <a routerLink="/projects" routerLinkActive="nav-link--active" [routerLinkActiveOptions]="{exact: false}" class="nav-link">
                    Projects
                </a>
                @if (user(); as u) {
                    <span class="user-email">{{ u.email }}</span>
                }
                <button type="button" class="nav-link" (click)="logout()">Sign out</button>
            </nav>
        </div>
    </header>
    <main class="content">
        <router-outlet />
    </main>
</div>
