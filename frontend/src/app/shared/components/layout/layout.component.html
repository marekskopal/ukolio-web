<div class="shell">
    <header class="topbar">
        <div class="topbar-inner">
            <a routerLink="/projects" class="brand">
                <span class="brand-mark"></span>
                {{ 'app.brand' | translate }}
            </a>
            <div class="workspace-switcher">
                <button type="button" class="workspace-current" (click)="toggleSwitcher()">
                    <span class="workspace-label">{{ currentWorkspace()?.name ?? ('app.common.noWorkspace' | translate) }}</span>
                    <span class="workspace-caret">▾</span>
                </button>
                @if (switcherOpen()) {
                    <div class="workspace-menu">
                        @for (ws of workspaces(); track ws.id) {
                            <button
                                type="button"
                                class="workspace-item"
                                [class.workspace-item--active]="ws.id === currentWorkspaceId()"
                                (click)="switchTo(ws.id)"
                            >
                                {{ ws.name }}
                            </button>
                        }
                        <div class="workspace-menu-divider"></div>
                        <button type="button" class="workspace-item" (click)="createWorkspace()">
                            {{ 'app.nav.newWorkspace' | translate }}
                        </button>
                        <a class="workspace-item" routerLink="/workspaces" (click)="toggleSwitcher()">
                            {{ 'app.nav.manageWorkspaces' | translate }}
                        </a>
                    </div>
                }
            </div>
            <nav class="nav">
                <a routerLink="/projects" routerLinkActive="nav-link--active" [routerLinkActiveOptions]="{exact: false}" class="nav-link">
                    {{ 'app.nav.projects' | translate }}
                </a>

                <div class="lang-switcher">
                    <button type="button" class="nav-link" (click)="toggleLangMenu()">
                        {{ currentLang().toUpperCase() }}
                    </button>
                    @if (langMenuOpen()) {
                        <div class="lang-menu">
                            @for (lang of supportedLangs; track lang) {
                                <button
                                    type="button"
                                    class="lang-item"
                                    [class.lang-item--active]="lang === currentLang()"
                                    (click)="setLanguage(lang)"
                                >
                                    {{ ('app.settings.language' + (lang === 'en' ? 'En' : 'Cs')) | translate }}
                                </button>
                            }
                        </div>
                    }
                </div>

                @if (user(); as u) {
                    <span class="user-email">{{ u.email }}</span>
                }
                <button type="button" class="nav-link" (click)="logout()">{{ 'app.nav.signOut' | translate }}</button>
            </nav>
        </div>
    </header>
    <main class="content">
        <router-outlet />
    </main>
</div>
