<div class="form-page">
    <h1 class="page-title">{{ id() === null ? 'New project' : 'Edit project' }}</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-stack">
        <div class="field">
            <label class="field-label">Name</label>
            <input type="text" formControlName="name" class="input" />
        </div>
        <div class="field">
            <label class="field-label">Description</label>
            <textarea formControlName="description" rows="4" class="textarea"></textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary" [disabled]="form.invalid || saving()">
                {{ saving() ? 'Saving…' : 'Save' }}
            </button>
            <a routerLink="/projects" class="muted-link">Cancel</a>
        </div>
    </form>
</div>
