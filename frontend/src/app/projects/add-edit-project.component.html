<div class="form-page">
    <h1 class="page-title">{{ (id() === null ? 'app.projects.new' : 'app.projects.edit') | translate }}</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-stack">
        <div class="field">
            <label class="field-label">{{ 'app.common.name' | translate }}</label>
            <input type="text" formControlName="name" class="input" />
        </div>
        <div class="field">
            <label class="field-label">{{ 'app.common.description' | translate }}</label>
            <textarea formControlName="description" rows="4" class="textarea"></textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary" [disabled]="form.invalid || saving()">
                {{ (saving() ? 'app.actions.loading' : 'app.actions.save') | translate }}
            </button>
            <a routerLink="/projects" class="muted-link">{{ 'app.actions.cancel' | translate }}</a>
        </div>
    </form>
</div>
