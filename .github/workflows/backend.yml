name: Backend

on:
    push:
        branches: [main]
    pull_request:
        paths:
            - 'backend/**'
            - '.github/workflows/backend.yml'
    schedule:
        - cron: '0 6 * * 1'
    workflow_dispatch:

jobs:
    audit:
        name: Composer audit
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.5'
                  coverage: none
                  tools: composer

            - name: Run composer audit
              working-directory: backend
              run: composer audit --no-dev --abandoned=report

    backend:
        name: Backend
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.5'
                  coverage: none
                  tools: composer

            - name: Cache composer dependencies
              uses: actions/cache@v4
              with:
                  path: backend/vendor
                  key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
                  restore-keys: ${{ runner.os }}-composer-

            - name: Install composer dependencies
              working-directory: backend
              run: composer install --prefer-dist --no-progress --no-interaction

            - name: Prepare .env with a real AUTHORIZATION_TOKEN_KEY
              run: |
                  cp .env.example .env
                  sed -i "s|AUTHORIZATION_TOKEN_KEY=.*|AUTHORIZATION_TOKEN_KEY=$(openssl rand -hex 32)|" .env

            - name: Docker compose build (smoke)
              run: docker compose --profile dev build backend db redis memcached

            - name: Boot test services (db + redis + memcached + rabbitmq + backend)
              run: docker compose -f docker-compose.yml -f docker-compose.test.yml --profile dev up -d --wait db redis memcached rabbitmq backend

            - name: Run PHPStan
              if: always()
              run: docker compose exec -T backend vendor/bin/phpstan analyse --no-progress --memory-limit=1G

            - name: Run PHPCS
              if: always()
              run: docker compose exec -T backend vendor/bin/phpcs

            - name: Run PHPUnit
              if: always()
              run: docker compose exec -T -e TEST_MYSQL_DATABASE=ukolio_test backend vendor/bin/phpunit

            - name: Dump docker logs on failure
              if: failure()
              run: docker compose logs --no-color
