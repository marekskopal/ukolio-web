name: ukolio

services:
    proxy:
        build:
            context: ./proxy
            dockerfile: Dockerfile
        ports:
            - "${PROXY_PORT}:80"
        restart: unless-stopped
        depends_on:
            - frontend
            - backend
        networks:
            - frontend
            - backend

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        restart: unless-stopped
        networks:
            - frontend

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        environment:
            MYSQL_HOST: ${MYSQL_HOST}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
            AUTHORIZATION_TOKEN_KEY: ${AUTHORIZATION_TOKEN_KEY}
            BACKEND_FRANKENPHP_WORKERS: ${BACKEND_FRANKENPHP_WORKERS}
            BACKEND_CORS_ALLOWED_ORIGIN: ${BACKEND_CORS_ALLOWED_ORIGIN}
            BACKEND_LOG_LEVEL: ${BACKEND_LOG_LEVEL}
            SMTP_HOST: ${SMTP_HOST}
            SMTP_PORT: ${SMTP_PORT}
            SMTP_USER: ${SMTP_USER}
            SMTP_PASSWORD: ${SMTP_PASSWORD}
            EMAIL_FROM: ${EMAIL_FROM}
            APP_URL: ${APP_URL}
        depends_on:
            - db
        restart: unless-stopped
        networks:
            - backend
        volumes:
            - ./log:/app/log

    db:
        image: mariadb:11.4
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        networks:
            - backend
        volumes:
            - ukolio_data:/var/lib/mysql

    adminer:
        image: adminer:5.4.2
        restart: unless-stopped
        networks:
            - frontend
            - backend
        profiles:
            - dev

    mailpit:
        image: axllent/mailpit:v1.20
        restart: unless-stopped
        networks:
            - backend
            - frontend
        environment:
            MP_SMTP_AUTH_ACCEPT_ANY: 1
            MP_SMTP_AUTH_ALLOW_INSECURE: 1

networks:
    frontend:
        name: ukolio_frontend
    backend:
        name: ukolio_backend

volumes:
    ukolio_data:
        name: ukolio_data
