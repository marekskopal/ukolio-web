name: ukolio

services:
    proxy:
        build:
            context: ./proxy
            dockerfile: Dockerfile
            args:
                ADMINER_USER: ${ADMINER_USER}
                ADMINER_PASSWORD: ${ADMINER_PASSWORD}
        environment:
            PROXY_HOST: ${PROXY_HOST}
            PROXY_PORT_SSL: ${PROXY_PORT_SSL}
        ports:
            - "${PROXY_PORT}:80"
            - "${PROXY_PORT_SSL}:443"
        restart: unless-stopped
        depends_on:
            - frontend
            - backend
        networks:
            - frontend
            - backend
        volumes:
            - ${PROXY_SSL_CERT}:/etc/nginx/ssl/server.pem:ro
            - ${PROXY_SSL_KEY}:/etc/nginx/ssl/server.key:ro

    web:
        build:
            context: ./web
            dockerfile: Dockerfile
        environment:
            MYSQL_HOST: ${MYSQL_HOST}
            MYSQL_DATABASE: ${MYSQL_DATABASE_WEB}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
            TYPO3_CONTEXT: ${TYPO3_CONTEXT}
            REVERSE_PROXY_IP: ${REVERSE_PROXY_IP}
        depends_on:
            - proxy
        restart: unless-stopped
        networks:
            - frontend
            - backend
        volumes:
            - ukolio_web_public:/var/www/html/public
            - ukolio_web_var:/var/www/html/var
            - ./log:/var/www/html/var/log

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        restart: unless-stopped
        networks:
            - frontend

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        environment:
            MYSQL_HOST: ${MYSQL_HOST}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
            AUTHORIZATION_TOKEN_KEY: ${AUTHORIZATION_TOKEN_KEY}
            BACKEND_FRANKENPHP_WORKERS: ${BACKEND_FRANKENPHP_WORKERS}
            BACKEND_CORS_ALLOWED_ORIGIN: ${BACKEND_CORS_ALLOWED_ORIGIN}
            BACKEND_LOG_LEVEL: ${BACKEND_LOG_LEVEL}
            SMTP_HOST: ${SMTP_HOST}
            SMTP_PORT: ${SMTP_PORT}
            SMTP_USER: ${SMTP_USER}
            SMTP_PASSWORD: ${SMTP_PASSWORD}
            EMAIL_FROM: ${EMAIL_FROM}
            APP_URL: ${APP_URL}
            S3_ENDPOINT: ${S3_ENDPOINT}
            S3_REGION: ${S3_REGION}
            S3_BUCKET: ${S3_BUCKET}
            S3_ACCESS_KEY: ${S3_ACCESS_KEY}
            S3_SECRET_KEY: ${S3_SECRET_KEY}
            S3_USE_PATH_STYLE: ${S3_USE_PATH_STYLE}
            TASK_FILE_MAX_SIZE_MB: ${TASK_FILE_MAX_SIZE_MB}
            REDIS_HOST: ${REDIS_HOST}
            REDIS_PORT: ${REDIS_PORT}
            REDIS_PASSWORD: ${REDIS_PASSWORD}
            MCP_SESSION_TTL: ${MCP_SESSION_TTL}
        depends_on:
            - minio
            - redis
        restart: unless-stopped
        networks:
            - backend
        volumes:
            - ./log:/app/log

    db:
        image: mariadb:11.4
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        networks:
            - backend
        volumes:
            - ukolio_data:/var/lib/mysql
        profiles:
            - dev

    adminer:
        image: adminer:5.4.2
        restart: unless-stopped
        networks:
            - frontend
            - backend

    mailpit:
        image: axllent/mailpit:v1.20
        restart: unless-stopped
        networks:
            - backend
            - frontend
        environment:
            MP_SMTP_AUTH_ACCEPT_ANY: 1
            MP_SMTP_AUTH_ALLOW_INSECURE: 1

    minio:
        image: minio/minio:RELEASE.2025-01-20T14-49-07Z
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${S3_ACCESS_KEY}
            MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
        restart: unless-stopped
        networks:
            - backend
        ports:
            - "9001:9001"
        volumes:
            - ukolio_minio:/data

    redis:
        image: redis:8.6.3-alpine
        restart: unless-stopped
        environment:
            REDIS_PASSWORD: ${REDIS_PASSWORD}
        command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
        networks:
            - backend
        volumes:
            - ukolio_redis:/data

networks:
    frontend:
        name: ukolio_frontend
    backend:
        name: ukolio_backend

volumes:
    ukolio_data:
        name: ukolio_data
    ukolio_minio:
        name: ukolio_minio
    ukolio_redis:
        name: ukolio_redis
    ukolio_web_public:
        name: fingather_web_public
    ukolio_web_var:
        name: fingather_web_var